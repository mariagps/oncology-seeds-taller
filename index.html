<!DOCTYPE html>
<html lang="es">
<head>

    <style>

        p { font-size: 0.95rem; line-height: 1.6; color: #555; margin-bottom: 1.5rem; }
        a {
            color: #1a7bc4;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover { text-decoration: underline; }

</head>
<body>
    <div class="card">
        <h1>Este contenido ya no está disponible</h1>
        <p>Los materiales de este taller han sido retirados tras finalizar el periodo de acceso.</p>
        <p>Si necesitas información, contacta con:<br>
